name: CI / Release

# ─────────────────────────────────────────────────────────────────────────────
# Triggers
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main, websocket-blake3]
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write   # necessário para criar GitHub Releases

# ─────────────────────────────────────────────────────────────────────────────
# Jobs
# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ───────────────────────────────────────────────
  # 🐧 Linux → .deb (Debian/Ubuntu)
  # ───────────────────────────────────────────────
  build-linux-deb:
    name: 🐧 Linux (.deb)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-cargo-deb-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: linux-cargo-deb-

      - name: Instalar dependências de sistema (egui/eframe + GTK)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libwayland-dev libgtk-3-dev \
            libssl-dev pkg-config

      - name: 🧪 Testes de qualidade (gate obrigatório)
        run: cargo test --lib --tests -- --test-threads=4
        # ⛔ A build NÃO prossegue se qualquer teste falhar

      - name: Instalar cargo-deb
        run: cargo install cargo-deb --locked

      - name: Build release (necessário antes do cargo-deb)
        run: cargo build --release

      - name: Gerar pacote .deb
        run: cargo deb --no-build
        # --no-build: reusa o binário que já compilamos acima

      - name: Mover .deb para raiz com nome fixo
        run: |
          DEB=$(ls target/debian/*.deb | head -1)
          cp "$DEB" onion-poc_linux_amd64.deb
          echo "Pacote gerado: $DEB"

      - name: Validar .desktop e listar conteúdo do .deb
        run: |
          dpkg-deb --contents onion-poc_linux_amd64.deb
          echo "verificando .desktop..."
          dpkg-deb --fsys-tarfile onion-poc_linux_amd64.deb | tar -tv | grep -E ".desktop|.svg|appdata"

      - name: Upload artefato .deb
        uses: actions/upload-artifact@v4
        with:
          name: onion-poc_linux_amd64.deb
          path: onion-poc_linux_amd64.deb

  # ───────────────────────────────────────────────
  # 🪟 Windows → .exe
  # ───────────────────────────────────────────────
  build-windows:
    name: 🪟 Windows (.exe)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: windows-cargo-

      - name: Build release
        run: cargo build --release

      - name: Baixar e extrair Tor Expert Bundle
        shell: bash
        run: |
          rm -rf target/release/tor
          mkdir -p target/release/tor_temp
          curl -L -s -o tor.tar.gz https://archive.torproject.org/tor-package-archive/torbrowser/14.0.7/tor-expert-bundle-windows-x86_64-14.0.7.tar.gz
          tar -xzf tor.tar.gz -C target/release/tor_temp
          # O bundle v14 extrai uma pasta "tor/". Vamos mover puramente para evitar conflito com cache do GitHub:
          if [ -d "target/release/tor_temp/tor" ]; then
            mv target/release/tor_temp/tor target/release/tor
          else
            mv target/release/tor_temp target/release/tor
          fi
          rm -rf target/release/tor_temp

      - name: Compilar Instalador (Inno Setup)
        run: iscc installer.iss

      - name: Upload artefatos Windows
        uses: actions/upload-artifact@v4
        with:
          name: onion_poc_setup_windows.exe
          path: target\inno\onion_poc_setup_windows.exe

  # ───────────────────────────────────────────────
  # 🍎 macOS → binário universal
  # ───────────────────────────────────────────────
  build-macos:
    name: 🍎 macOS (binário)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: macos-cargo-

      - name: Build release
        run: cargo build --release

      - name: Copiar binário com nome fixo
        run: cp target/release/onion_poc onion_poc-macos-x86_64

      - name: Upload artefato macOS
        uses: actions/upload-artifact@v4
        with:
          name: onion_poc-macos-x86_64
          path: onion_poc-macos-x86_64

  # ───────────────────────────────────────────────
  # 🚀 GitHub Release — só executa em tag v*
  # ───────────────────────────────────────────────
  release:
    name: 🚀 Publicar Release
    needs: [build-linux-deb, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Baixar todos os artefatos
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true   # coloca tudo na mesma pasta dist/

      - name: Listar artefatos
        run: ls -lh dist/

      - name: Criar GitHub Release com binários
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/onion-poc_linux_amd64.deb
            dist/onion_poc_setup_windows.exe
            dist/onion_poc-macos-x86_64
          generate_release_notes: true
          body: |
            ## 🧅 onion_poc — Compartilhamento seguro via Tor

            > **O wizard de configuração cuida de tudo automaticamente.**
            > Na primeira execução, o app detecta se o Tor está instalado e oferece a instalação com um clique — sem configuração manual.

            ---

            ## 📥 Download e instalação rápida

            | Plataforma | Arquivo | Como instalar |
            |---|---|---|
            | 🐧 Linux | `onion-poc_linux_amd64.deb` | `sudo dpkg -i onion-poc_linux_amd64.deb` |
            | 🪟 Windows | `onion_poc_setup_windows.exe` | Baixe e execute o instalador completo |
            | 🍎 macOS | `onion_poc-macos-x86_64` | `chmod +x` e execute |

            ## 🚀 Uso

            Abra o app sem argumentos para a interface gráfica TUI:
            ```bash
            onion_poc
            ```

            > ⚠️ Se o Tor não estiver instalado, o wizard irá instalar automaticamente ao aceitar os termos de uso.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
